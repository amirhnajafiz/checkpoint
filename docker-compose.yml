services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mayigoo
      POSTGRES_PASSWORD: mayigoo
      POSTGRES_DB: mayigoo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayigoo -d mayigoo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: build/Dockerfile
    ports:
      - "5000:5000"
    environment:
      MAYIGOO_HTTP__ADDR: ""
      MAYIGOO_HTTP__PORT: 5000
      MAYIGOO_DB__HOST: postgres
      MAYIGOO_DB__PORT: "5432"
      MAYIGOO_DB__USER: mayigoo
      MAYIGOO_DB__PASSWORD: mayigoo
      MAYIGOO_DB__NAME: mayigoo
      MAYIGOO_DB__SSL_MODE: disable
      MAYIGOO_REDIS__HOST: redis
      MAYIGOO_REDIS__PORT: "6379"
      MAYIGOO_JWT__SECRET: ${JWT__SECRET:-dev-secret-change-me}
      MAYIGOO_JWT__TTL: 24h
      # Provide these via a .env file next to docker-compose.yml (see .env.example).
      MAYIGOO_OAUTH__CLIENT_ID: ${OAUTH__CLIENT_ID:-}
      MAYIGOO_OAUTH__CLIENT_SECRET: ${OAUTH__CLIENT_SECRET:-}
      MAYIGOO_OAUTH__REDIRECT_URL: ${OAUTH__REDIRECT_URL:-http://localhost:5000/api/users/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
