services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mayigoo
      POSTGRES_PASSWORD: mayigoo
      POSTGRES_DB: mayigoo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mayigoo -d mayigoo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      HTTP_ADDR: ":5000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: mayigoo
      DB_PASSWORD: mayigoo
      DB_NAME: mayigoo
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL: 24h
      # Provide these via a .env file next to docker-compose.yml (see .env.example).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:5000/api/users/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
